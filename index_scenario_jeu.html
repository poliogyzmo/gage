<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu des Gages – Accueil</title>
  <style>
    body {
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    form {
      background: rgba(255,255,255,0.05);
      padding: 2rem;
      border-radius: 15px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }
    label {
      font-weight: bold;
      font-size: 0.9rem;
    }
    input[type="text"], select {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.9);
      font-size: 1rem;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-left: 10px;
    }
    .checkbox-group label {
      font-weight: normal;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    input[type="checkbox"] {
      transform: scale(1.2);
      accent-color: #00ff99;
    }
    button {
      padding: 10px;
      background: #00ff99;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #00cc77;
    }
    footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>🔥 Jeu des Gages 🔥</h1>
  <form id="formJeu" action="jeu.html">
    <label>Nom joueur 1 :</label>
    <input type="text" name="joueur1" required>

    <label>Genre joueur 1 :</label>
    <select name="genre1" required>
      <option value="femme">Femme</option>
      <option value="homme">Homme</option>
    </select>

    <label>Anal ? :</label>
    <div class="checkbox-group" id="special1">
      <label><input type="checkbox" value="non"> Non</label>
      <label><input type="checkbox" value="langue">Avec la langue</label>
      <label><input type="checkbox" value="doigt">Juste un doigt</label>
      <label><input type="checkbox" value="jouet">Plug, gode, crochet</label>
      <label><input type="checkbox" value="oui">Pénétration sexe ou gode ceinture</label>
    </div>

    <hr style="width:100%;opacity:0.3;">

    <label>Nom joueur 2 :</label>
    <input type="text" name="joueur2" required>

    <label>Genre joueur 2 :</label>
    <select name="genre2" required>
      <option value="homme">Homme</option>
      <option value="femme">Femme</option>
    </select>

    <label>Anal ? :</label>
    <div class="checkbox-group" id="special2">
      <label><input type="checkbox" value="non"> Non</label>
      <label><input type="checkbox" value="langue">Avec la langue</label>
      <label><input type="checkbox" value="doigt">Juste un doigt</label>
      <label><input type="checkbox" value="jouet">Plug, gode, crochet</label>
      <label><input type="checkbox" value="oui">Pénétration sexe ou gode ceinture</label>
    </div>

    <hr style="width:100%;opacity:0.3;">

    <label>Scénario :</label>
    <select name="scenario" required>
      <option value="soft_court">Soft court (5 gages chacun)</option>
      <option value="progressif">Progressif (9 gages chacun)</option>
      <option value="bdsm">BDSM (8 gages chacun)</option>
      <option value="domination">Domination (8 gages chacun)</option>
      <option value="bondage">Bondage (8 gages chacun)</option>
      <option value="femdom">Femdom (11 gages pour lui)</option>
      <option value="maledom">Maledom (11 gages pour elle)</option>    
      <option value="switch_court">Switch court(5 gages chacun)</option>
      <option value="switch_long">Switch long(12 gages chacun)</option>
    </select>

    <button type="submit">🎲 Lancer le jeu</button>
  </form>

  <footer>© 2025 Jeu des Gages – Tous droits réservés</footer>

 <script>
document.getElementById('formJeu').addEventListener('submit', e => {
  e.preventDefault();

  const form = e.target;
  const formData = new FormData(form);

  // 🔥 Récupération des cases cochées (déjà présent chez toi)
  const special1 = [...document.querySelectorAll('#special1 input:checked')].map(cb => cb.value);
  const special2 = [...document.querySelectorAll('#special2 input:checked')].map(cb => cb.value);

  // 🔥 Construire objet propre (AU LIEU de URL params)
  const data = {
    joueur1: formData.get('joueur1'),
    joueur2: formData.get('joueur2'),
    genre1: formData.get('genre1'),
    genre2: formData.get('genre2'),
    scenario: formData.get('scenario'),

    // préférences existantes (=anal)
    special1: special1,
    special2: special2,
  };
 
  // 🔥 reset propre (important)
  localStorage.removeItem('joueur1Prefs');
  localStorage.removeItem('joueur2Prefs');

  // 🔥 stockage global
  localStorage.setItem('gameSetup', JSON.stringify(data));

  // 🔥 redirection vers page secrète joueur 1
  window.location.href = "joueur1.html";
});
</script>

</body>
</html>
