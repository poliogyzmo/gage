<style>
:root{
  --accent:#4a6fb3;
}

html,body{
  height:100%;
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui,Segoe UI,Arial;
}

/* APP */
.app{
  height:100%;
}

/* CONTAINER CENTRÉ */
.container{
  display:flex;
  height:100%;
  padding:20px;
  gap:20px;
  box-sizing:border-box;
  max-width:1400px;
  margin:auto;
}

/* GIF */
.gif-container{
  flex:4;
  background:radial-gradient(circle, #111 0%, #000 100%);
  border-radius:30px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;

  /* glow sexy */
  box-shadow:0 0 40px rgba(255,0,0,0.1);
}

#gif{
width:100%;
  height:100%;
  object-fit:contain;
}

/* PANEL DROIT */
.right-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* NOM JOUEUR */
.player-name{
  font-size:28px;
  margin-bottom:30px;
  opacity:0.9;
}

/* TEXTE */
#texte{
  font-size:clamp(18px,1.4vw,24px);
  line-height:1.5;
  max-width:420px;
  margin-bottom:40px;
}

/* BOUTONS */
.controls{
  display:flex;
  gap:30px;
  margin-bottom:30px;
}

.btn{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:14px 22px;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

.btn.alt{
  background:#3b5c99;
}

/* COMPTEUR */
.gage-count{
  font-size:20px;
  opacity:0.8;
}

/* BARRE PROGRESS */
#progress{
  position:fixed;
  bottom:0;
  left:0;
  height:5px;
  background:#4a6fb3;
  width:0%;
  transition:width .4s ease;
}

/* 📱 MOBILE PAR DÉFAUT (portrait) */
.container{
  flex-direction:column;
  padding:0;
  gap:0;
}

.gif-container{
  border-radius:0;
  height:50vh;
}

#gif{
  width:100%;
  height:100%;
  object-fit:contain;
}

.right-panel{
  padding:16px;
}

#texte{
  max-width:100%;
  font-size:clamp(16px,4vw,22px);
  text-align:center;
}

.controls{
  gap:12px;
}

.btn{
  flex:1;
}


/* 🔄 MOBILE PAYSAGE (ULTRA IMPORTANT) */
@media (orientation: landscape) and (max-height: 500px){

  .container{
    flex-direction:row;
    padding:10px;
    gap:10px;
  }

  .gif-container{
    flex:4;
    height:100%;
    border-radius:20px;
  }

  #gif{
    width:100%;
    height:100%;
    object-fit:contain;
  }

  .right-panel{
    flex:1;
    height:100%;
    padding:12px;
    justify-content:center;
  }

  #texte{
    text-align:left;
    font-size:clamp(14px,2vw,18px);
  }

  .controls{
    flex-direction:column;
    gap:10px;
  }

  .btn{
    width:100%;
  }
}


/* 💻 DESKTOP / TABLETTE */
@media (min-width:900px){

  .container{
    flex-direction:row;
    padding:20px;
    gap:20px;
  }

  .controls{
    justify-content:flex-start;
    flex-direction:row;
  }

</style>

function readParams() {
  const qs = Object.fromEntries(new URL(location.href).searchParams.entries())
  return {

    genre1: qs.genre1 || 'femme',

  }
}

// Helper pour sélectionner un gage unique
function pickUnique(cands){
  const avail = cands.filter(c => !usedIds.has(c.id))
  return avail.length ? avail[Math.floor(Math.random()*avail.length)] : cands[Math.floor(Math.random()*cands.length)]
}

// Helper pour gérer l'ambiance
function pickAmbiance(a){
  if(a === 'mixed_dom') return Math.random() < 0.5 ? 'domination' : 'bondage'
  return a
}

// fetch candidats Supabase avec filtre sur gage spécial multiple
async function fetchCandidates({genre, niveau, ambiance, specials, level}) {
  specials = specials || ['non']
  const { data, error } = await supabase
    .from('gages')
    .select('*')
    .eq('lieu','interieur')
    .or(`genre.eq.${genre},genre.eq.mixte`)
    .eq('niveau', niveau)
    .eq('level', level)  
    .in('ambiance', [ambiance])
    .limit(500)

  if(error){console.error(error); return []}
  if(!data?.length) return []

  const filtered = data.filter(g => {
    if(!g.type_special) return specials.includes('non')
    return specials.includes(g.type_special)
  })
  return filtered.length ? filtered : data
}

// --- BUILD SEQUENCE ---
async function buildSequence(scenarioName, players){
  const pattern = SCENARIOS[scenarioName]
  const seq = []

  for(const step of pattern){
    // Respecter le genre défini dans le scénario
    const target = step.genre === player1.genre ? player1 : player2
    target.specials = target.specials || ['non']

    let niveau = step.niveau
    if(niveau === 'anal' && !target.specials.includes('oui')){
      niveau = 'avance'
    }

    const amb = pickAmbiance(step.ambiance)
      const level = step.level ?? 1 
    
    const candidates = await fetchCandidates({
      genre: target.genre,
      niveau: niveau,
      ambiance: amb,
      specials: target.specials, level
    })

    const chosen = pickUnique(candidates)
    if(chosen) usedIds.add(chosen.id)
    seq.push({...chosen, requestedAmbiance: amb, originalNiveau: step.niveau,
             level
             })
  }

  return seq
}


// --- RENDER ---
function renderCurrent(){
  const g = sequence[index]
  if(!g){texteDiv.textContent='Aucun gage';gifImg.src='';return}

  // déterminer le nom du joueur cible (opposé au genre du gage)
  let partnerName = ''
  if(g.genre === player1.genre && player2.name) partnerName = player2.name
  else if(g.genre === player2.genre && player1.name) partnerName = player1.name
  else partnerName = player1.name || player2.name

  texteDiv.textContent = `${partnerName} : ${g.texte || '—'}`
  gifImg.src = g.gif_url || ''
  progressBar.style.width = `${Math.round(((index+1)/sequence.length)*100)}%`
  status.textContent = `Gage ${index+1}/${sequence.length}`
}

// --- EVENTS ---

}

// changer gage (plusieurs fois possible)

    ambiance: g.requestedAmbiance,
    specials: target.specials,

    level: g.level,
    requestedAmbiance: g.requestedAmbiance,
    originalNiveau: g.originalNiveau
  }
  renderCurrent()
}
}

  document.body.style.opacity = "0.98"; // micro repaint

  setTimeout(() => {
    window.scrollTo(0,1); // fix viewport mobile
    document.body.style.opacity = "1";
  }, 200);
}

window.addEventListener("orientationchange", handleOrientationChange);
window.addEventListener("resize", handleOrientationChange);
</script>
</body>
</html>
