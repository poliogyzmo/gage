<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Joueur 1</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
}

h2{
  margin:30px 0;
}

.header-row{
  display:grid;
  grid-template-columns: 1fr 2fr 1fr 1fr;
  font-size:14px;
  opacity:0.7;
  margin-bottom:10px;
}

.row{
  display:grid;
  grid-template-columns: 1fr 2fr 1fr 1fr;
  align-items:center;
  margin:8px 0;
  padding:8px;
  border-radius:12px;
  transition:0.2s;
}

.row:hover{
  background:#222;
}

.label{
  text-align:center;
  font-weight:bold;
}

.left{
  text-align:right;
}

.self{
  text-align:center;
}

.other{
  text-align:left;
}

input[type="checkbox"]{
  transform: scale(1.4);
  cursor:pointer;
  transition:0.2s;
}

/* couleurs */
.block:checked{
  accent-color:#ff4d4d;
}

.self:checked{
  accent-color:#c77dff;
}

.other:checked{
  accent-color:#00e5ff;
}

button{
  margin-top:30px;
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#c77dff;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#a855f7;
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<h2>Joueur 1</h2>

<div class="header-row">
  <div>❌ Ce que je ne veux pas pour moi</div>
  <div></div>
  <div>💜 Ce que je veux pour moi</div>
  <div>🔥 Ce que je veux pour l'autre</div>
</div>

<div id="prefs"></div>

<button onclick="next()">Valider</button>

</div>

<script>

const PREF_KEYS = [
  'respiration','impact','humiliation','shibari','exhib','douleur','chaud_froid','ludique','soft','hard','laissecollier','entrave','sextoy','sensoriel'
]

const LABELS = {
  respiration: "Contrôle de la respiration",
  impact: "Jeu d'impact : Objet, gifle, fessée",
  humiliation: "Humiliation : Bodywriting, baillon, salive",
  shibari: "Shibari : Jeu avec les cordes",
  exhib: "Exhibition : Miroir, caméra, photo, exhib",
  douleur: "Douleur : Griffure, morsure, couteau, pince-téton",
  chaud_froid: "Chaud / Froid : Glaçon, cire",
  ludique: "Ludique : Pile ou face, shifoumi",
  soft: "Soft : Douceur",
  hard: "Hard : Tirage de cheveux, gorge profonde, sauvage",
  laissecollier: "Laisse et/ou collier",
  entrave: "Entrave : Menotte, corde, etc...",
  sextoy: "Sextoy : Gode, plug, crochet, womanizer",
  sensoriel: "Privation sensorielle : Bandage des yeux, momification"
}

const container = document.getElementById('prefs')

PREF_KEYS.forEach(pref=>{
  container.innerHTML += `
    <div class="row">
      <div class="left">
        <input type="checkbox" value="${pref}" class="block">
      </div>

      <div class="label">${LABELS[pref]}</div>

      <div class="self">
        <input type="checkbox" value="${pref}" class="self">
      </div>

      <div class="other">
        <input type="checkbox" value="${pref}" class="other">
      </div>
    </div>
  `
})

function getChecked(className){
  return [...document.querySelectorAll('.'+className+':checked')]
    .map(e=>e.value)
}

function next(){

  const data = {
    envies_self: getChecked('self'),
    envies_other: getChecked('other'),
    envies_block: getChecked('block')
  }

  localStorage.setItem('joueur1Prefs', JSON.stringify(data))
  window.location.href = 'joueur2.html'
}

</script>

</body>
</html>
